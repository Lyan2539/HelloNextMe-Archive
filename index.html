<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLONEXTME / 认知实验室</title>
    <style>
        /* MIT Media Lab 风格基础：极简、高对比 */
        :root {
            --black: #000000;
            --white: #ffffff;
            --grey: #f0f0f0;
            --border-width: 2px;
        }

        body { 
            margin: 0; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            background-color: var(--white);
            color: var(--black);
        }

        /* 顶部导航：粗线条分隔 */
        header {
            padding: 20px 5%;
            border-bottom: var(--border-width) solid var(--black);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .logo { font-weight: 900; font-size: 1.8rem; text-decoration: none; color: var(--black); letter-spacing: -1px; }
        .nav-links a { margin-left: 20px; text-decoration: none; color: var(--black); font-size: 0.9rem; font-weight: bold; }

        /* 主体内容布局 */
        main { padding: 40px 5%; }

        /* 欢迎语：大字号、左对齐 */
        .intro {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 60px;
            max-width: 800px;
        }

        /* 模块化网格：MIT Media Lab 的核心 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            border-top: var(--border-width) solid var(--black);
        }

        .grid-item {
            padding: 30px 20px 60px 0;
            border-bottom: 1px solid #ddd;
            transition: all 0.2s;
        }

        .grid-item:hover { background: var(--grey); }

        .tag {
            display: inline-block;
            background: var(--black);
            color: var(--white);
            padding: 2px 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .grid-item h3 { font-size: 1.5rem; margin: 0 0 10px 0; font-weight: 700; }
        .grid-item p { font-size: 1rem; color: #444; margin-bottom: 20px; }
        .grid-item a { color: var(--black); text-decoration: underline; font-weight: bold; }

        /* 页脚 */
        footer {
            margin-top: 100px;
            padding: 40px 5%;
            border-top: var(--border-width) solid var(--black);
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header style="background-color: #1a1a1a; padding: 0 5%; height: 80px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #cc9933;">
    <div style="display: flex; align-items: center;">
        <a href="/" style="display: flex; align-items: center; text-decoration: none;">
            <img src="./logo.png" alt="Logo" style="height: 50px; margin-right: 15px;">
            <div style="color: white; border-left: 1px solid #555; padding-left: 15px;">
                <span style="display: block; font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; line-height: 1;">HELLONEXTME</span>
                <span style="display: block; font-size: 0.7rem; color: #aaa; margin-top: 5px; text-transform: uppercase;">Cognition Laboratory</span>
            </div>
        </a>
    </div>

    <nav class="nav-links">
        <a href="https://www.youtube.com/@Hello-NextMe" target="_blank" style="color: white; text-decoration: none; font-size: 0.8rem; font-weight: 600; text-transform: uppercase;">YouTube 频道</a>
        <a href="#" style="color: white; text-decoration: none; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-left: 30px; border: 1px solid white; padding: 8px 15px;">进入存档</a>
    </nav>
</header>

<section style="background-color: #fff; padding: 120px 5% 60px 5%; text-align: left;">
    <div class="intro" style="max-width: 980px; margin: 0 auto;">
        <h1 style="font-size: clamp(3rem, 8vw, 5rem); font-weight: 700; line-height: 1.05; letter-spacing: -0.015em; color: #1d1d1f; margin: 0;">
            将复杂的修行逻辑<br>
            <span style="color: #86868b;">降维至实操维度。</span>
        </h1>
        <p style="font-size: 1.5rem; color: #86868b; margin-top: 40px; font-weight: 500; max-width: 600px;">
            为生生世世的觉醒留下逻辑信标。
        </p>
    </div>
</section>

<section style="width: 100%; padding: 0 5%; box-sizing: border-box; margin-bottom: 80px;">
    <div style="width: 100%; height: 60vh; background: #f5f5f7 url('./images/hero-bg.jpg') no-repeat center center/cover; border-radius: 28px; overflow: hidden;">
        </div>
</section>

<main style="background-color: #f5f5f7; padding: 80px 0;">
    <div style="padding: 0 5% 30px 5%; max-width: 980px; margin: 0 auto;">
        <h2 style="font-size: 1.8rem; font-weight: 700; color: #1d1d1f;">核心认知模块</h2>
    </div>

    <div class="scroll-container" style="display: flex; overflow-x: auto; padding: 20px 5%; gap: 20px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;">
        
        <div class="apple-card" style="flex: 0 0 350px; height: 480px; background: white; border-radius: 22px; overflow: hidden; scroll-snap-align: start; box-shadow: 0 8px 24px rgba(0,0,0,0.04); transition: transform 0.3s ease;">
            <div style="height: 100%; background: url('./images/card1.jpg') no-repeat center center/cover; display: flex; flex-direction: column; padding: 30px;">
                <span style="color: #bf4800; font-weight: 700; font-size: 0.8rem; text-transform: uppercase;">Dimension 01</span>
                <h3 style="font-size: 1.5rem; margin-top: 10px; color: #1d1d1f;">底层逻辑分析</h3>
            </div>
        </div>

        <div class="apple-card" style="flex: 0 0 350px; height: 480px; background: white; border-radius: 22px; overflow: hidden; scroll-snap-align: start; box-shadow: 0 8px 24px rgba(0,0,0,0.04);">
            <div style="height: 100%; background: url('./images/card2.jpg') no-repeat center center/cover; display: flex; flex-direction: column; padding: 30px;">
                <span style="color: #0066cc; font-weight: 700; font-size: 0.8rem; text-transform: uppercase;">Practice</span>
                <h3 style="font-size: 1.5rem; margin-top: 10px; color: #1d1d1f;">降维实操指南</h3>
            </div>
        </div>

        <div class="apple-card" style="flex: 0 0 350px; height: 480px; background: #000; border-radius: 22px; overflow: hidden; scroll-snap-align: start; box-shadow: 0 20px 40px rgba(0,0,0,0.2);">
            <div style="height: 100%; background: url('./images/card3.jpg') no-repeat center center/cover; display: flex; flex-direction: column; justify-content: flex-end; padding: 30px;">
                <h3 style="font-size: 1.5rem; color: #fff; margin-bottom: 10px;">20+ 视频索引</h3>
                <p style="color: #86868b; margin: 0;">结构化整理核心论点</p>
            </div>
        </div>

    </div>
</main>

<style>
    /* 隐藏滚动条 */
    .scroll-container::-webkit-scrollbar { display: none; }
    .scroll-container { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 悬停微动效 */
    .apple-card:hover { transform: scale(1.01); }
</style>

<footer>
    &copy; 2026 HELLONEXTME / NO IDENTITY / NO BURDEN / LOGIC ONLY.
</footer>

</body>
</html>
